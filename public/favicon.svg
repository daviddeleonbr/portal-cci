<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado azul-teal (mesma família do badge "C" do portal) -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 3 barras crescentes -->
  <rect x="13" y="34" width="10" height="18" rx="2" fill="#ffffff" fill-opacity="0.92"/>
  <rect x="27" y="24" width="10" height="28" rx="2" fill="#ffffff"/>
  <rect x="41" y="14" width="10" height="38" rx="2" fill="#ffffff"/>
  <!-- Linha base sutil -->
  <rect x="11" y="52" width="42" height="2" rx="1" fill="#ffffff" fill-opacity="0.4"/>
</svg>
