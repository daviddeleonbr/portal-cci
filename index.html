<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Força HTTPS em todos os recursos da página (evita "Inseguro" por
         mixed content quando alguma URL externa for cadastrada com http://) -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <link rel="icon" type="image/png" href="/logo-cci.png" />
    <link rel="apple-touch-icon" href="/logo-cci.png" />
    <link rel="mask-icon" href="/logo-cci.png" color="#1B8073" />
    <!-- Fallback antes do JS aplicar: respeita prefers-color-scheme do SO.
         Depois useTheme atualiza uma terceira meta (sem media) com o tema
         efetivamente aplicado (que pode ter sido alternado manualmente). -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / instalação em tela inicial -->
    <meta name="application-name" content="CCI" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CCI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Fonte Sora pra logo CCI -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" />

    <title>CCI · Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
